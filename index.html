<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌳 樹木点検システム（最終完全版）</title>
  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- html2canvas (全体マップ画像保存用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f4f6f0; color: #1a1a1a; padding-bottom: 30px; }
    .hdr { background: linear-gradient(145deg, #1e3a0e, #2d5016); color: white; padding: 18px 16px; border-radius: 0 0 28px 28px; }
    .tabs { display: flex; gap: 6px; margin: 16px 12px; background: white; padding: 6px; border-radius: 50px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-wrap: wrap; }
    .tab-btn { flex:1; padding: 10px 4px; border: none; background: transparent; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
    .tab-btn.active { background: #4a7c2f; color: white; }
    .content { padding: 0 12px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .card { background: white; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    .card-hdr { padding: 14px 18px; font-weight: 700; background: #e8f3df; border-bottom: 2px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px; }
    .card-hdr.brown { background: #f3ede5; }
    .card-hdr.blue { background: #e3f2fd; }
    .sn { background: #2d5016; color: white; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
    .card-body { padding: 16px; }
    .frow { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
    .c2 > * { flex: 1 1 calc(50% - 6px); min-width: 140px; }
    .fg { display: flex; flex-direction: column; }
    .lbl { font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; color: #555; display: flex; align-items: center; gap: 4px; }
    .req { color: #c62828; margin-left: 3px; }
    .inp { padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 14px; font-size: 1rem; background: #fdfdfd; }
    .rgroup { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
    .rbtn { flex: 1 0 70px; padding: 8px 4px; background: #f2f2f2; border: 1.5px solid #ccc; border-radius: 30px; font-weight: 600; font-size: 0.9rem; cursor: pointer; text-align: center; line-height: 1.3; transition: all 0.1s; }
    .rbtn.sel { background: #4a7c2f; border-color: #2d5016; color: white; }
    .rbtn small { display: block; font-weight: 400; font-size: 0.65rem; opacity: 0.85; margin-top: 2px; }
    .btn-pri { background: #2d5016; color: white; border: none; padding: 16px; border-radius: 50px; font-weight: 700; font-size: 1.2rem; width: 100%; cursor: pointer; }
    .btn-sec { background: #eee; border: 1px solid #bbb; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .btn-cancel { background: #ffcdd2; border: 1px solid #c62828; color: #b71c1c; }
    .submit-area { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
    .photo-area { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .photo-item { position: relative; width: 90px; height: 90px; }
    .photo-thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; border: 2px solid #ccc; background: #eee; }
    .photo-del { position: absolute; top: -5px; right: -5px; background: #c62828; color: white; border: none; width: 26px; height: 26px; border-radius: 50%; font-weight: bold; cursor: pointer; }
    .photo-save { position: absolute; bottom: -5px; right: -5px; background: #2d5016; color: white; border: none; width: 26px; height: 26px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 14px; }
    .grade-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 700; }
    .grade-A { background: #2e7d32; color: white; }
    .grade-B { background: #f9a825; color: black; }
    .grade-C { background: #e65100; color: white; }
    .grade-D { background: #b71c1c; color: white; }
    .record-item { background: white; border-radius: 20px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
    .search-bar .inp { flex: 1; }
    .search-bar select.inp { max-width: 130px; font-size: 0.85rem; padding: 12px 8px; }
    .record-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn-small { padding: 6px 14px; border-radius: 30px; border: none; background: #e0e0e0; font-weight: 500; cursor: pointer; }
    #map, #allMap { height: 220px; width: 100%; border-radius: 14px; margin-top: 12px; border: 1px solid #ccc; z-index: 1; }
    #allMap { height: 400px; }
    .loc-photo-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid #ccc; margin-top: 8px; }
    /* マーカーラベル */
    .marker-label {
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid #2d5016;
      border-radius: 12px;
      padding: 1px 4px;
      font-weight: bold;
      font-size: 8px;
      color: #2d5016;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
      white-space: nowrap;
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(1px);
    }
    /* 印刷用スタイル */
    @media print {
      body { background: white; padding: 0; }
      .hdr, .tabs, .submit-area, .photo-del, .photo-save, .btn-sec, .btn-pri, .btn-cancel, .search-bar, .record-actions, .tab-btn { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; page-break-inside: avoid; }
      .content { padding: 0; }
      .tab-panel { display: block !important; }
      #map, #allMap { height: 350px !important; border: 1px solid #000; break-inside: avoid; page-break-inside: avoid; }
      .card-body { padding: 8px; }
    }
    /* 全体マップ単独印刷用（強化版） */
    .print-map-only body * {
      visibility: hidden !important;
    }
    .print-map-only #allMap,
    .print-map-only #allMap * {
      visibility: visible !important;
    }
    .print-map-only #allMap {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      margin: 0 !important;
      border: none !important;
      border-radius: 0 !important;
    }
  </style>
</head>
<body>

<header class="hdr">
  <h1>🌲 樹木点検・診断</h1>
  <div class="sub">Ver.20（マップ連携強化）</div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="inspect">📋 点検入力</button>
  <button class="tab-btn" data-tab="records">📚 記録一覧</button>
  <button class="tab-btn" data-tab="allmap">🗺️ 全体マップ</button>
  <button class="tab-btn" data-tab="guide">📖 判定基準</button>
</div>

<div class="content">
  <!-- 点検入力タブ -->
  <div class="tab-panel active" id="tab-inspect">
    <!-- 省略：前回と同一 -->
  </div>

  <!-- 記録一覧タブ -->
  <div class="tab-panel" id="tab-records">
    <!-- 省略：前回と同一 -->
  </div>

  <!-- 全体マップタブ -->
  <div class="tab-panel" id="tab-allmap">
    <div class="card">
      <div class="card-hdr green">🗺️ 全樹木位置マップ</div>
      <div class="card-body">
        <div id="allMap"></div>
        <div style="margin-top:12px; display:flex; gap:8px;">
          <button class="btn-sec" onclick="printAllMap()">🖨️ マップ印刷</button>
          <button class="btn-sec" onclick="saveAllMapAsImage()">📸 画像保存</button>
        </div>
        <p style="margin-top:8px; font-size:0.8rem;">ピンをタップ → 「編集画面へ」で点検入力に移動</p>
      </div>
    </div>
  </div>

  <!-- ガイド -->
  <div class="tab-panel" id="tab-guide">
    <!-- 省略 -->
  </div>
</div>

<script>
  (function(){
    "use strict";

    // 変数宣言などは前回と同一（省略）

    // ========== 追加：ポップアップから編集画面へ移動 ==========
    window.jumpToEdit = function(id) {
      // editRecordを呼び出してフォームにデータセット＆タブ移動
      if (typeof editRecord === 'function') {
        editRecord(id);
      } else {
        console.error('editRecord function not found');
      }
      // 念のためタブを点検入力に切り替え
      showTab('inspect');
    };

    // ========== 全体マップマーカー更新（ポップアップにボタン追加） ==========
    function updateAllMapMarkers() {
      if (!markersLayer) return;
      markersLayer.clearLayers();
      const valid = records.filter(r => r?.id && r.latitude && r.longitude);
      valid.forEach(r => {
        const lat = parseFloat(r.latitude), lng = parseFloat(r.longitude);
        if (isNaN(lat) || isNaN(lng)) return;
        
        // ポップアップ内容に「編集画面へ」ボタンを追加
        const popupContent = `
          <b>${r.treeNo} : ${r.species}</b><br>
          ${r.location || ''}<br>
          調査日: ${r.surveyDate}<br>
          判定: ${r.overall}<br>
          <button onclick="window.jumpToEdit('${r.id}')" style="margin-top:6px;padding:4px 12px;background:#4a7c2f;color:white;border:none;border-radius:20px;font-size:12px;cursor:pointer;">✏️ 編集画面へ</button>
        `;
        
        L.marker([lat, lng], { icon: createLabelIcon(r.treeNo || '●') })
          .bindPopup(popupContent)
          .addTo(markersLayer);
      });
      if (valid.length) {
        const bounds = L.featureGroup(valid.map(r => L.marker([parseFloat(r.latitude), parseFloat(r.longitude)]))).getBounds();
        if (bounds.isValid()) allMap.fitBounds(bounds.pad(0.1));
      }
    }

    // ========== 全体マップ印刷（修正版） ==========
    window.printAllMap = function() {
      // 全体マップタブに切り替え
      showTab('allmap');
      
      // 地図サイズを再計算
      setTimeout(() => {
        if (allMap) allMap.invalidateSize();
        
        // 印刷用クラスを追加
        document.body.classList.add('print-map-only');
        
        // 印刷実行
        window.print();
        
        // 印刷後（ダイアログが閉じた後）にクラスを削除
        setTimeout(() => {
          document.body.classList.remove('print-map-only');
        }, 200);
      }, 300);
    };

    // ========== 既存の関数群（省略部） ==========
    // 実際のコードでは、前回の完全な関数群をすべて含めてください。

    // 初期化処理など（省略）
  })();
</script>
</body>
</html>
